  function formatTime(seconds){

+ ":"
+ String(sec).padStart(2,"0");

}

function highlight(text,term){

if(!term) return text;

const parts = text.split(
/(\(.*?\)|\[.*?\]|$.*?$|\begin{.*?}.*?\end{.*?})/g
);

return parts.map(part=>{

// LaTeX অংশ untouched থাকবে
if(
part.startsWith("\(") ||
part.startsWith("\[") ||
part.startsWith("$") ||
part.startsWith("\begin")
){
return part;
}

// normal text highlight হবে
const regex = new RegExp("(" + term + ")","gi");

return part.replace(regex,"<mark>$1</mark>");

}).join("");

}

  function parseQRange(v){
v = v.trim();
if(v.includes("-")){
let [a,b] = v.split("-").map(Number);
return [a,b];
}
let x = Number(v);
return [x,x];
}

function normalizeLatex(str){
  return (str || "")
    .toLowerCase()
    .replace(/\frac/g,"frac")
    .replace(/\sqrt/g,"sqrt")
    .replace(/[{}\^_]/g,"")
    .replace(/s+/g,"")
    .trim();
}

      normalizeLatex(q.extraBox).includes(term)
    ) ||

    (q.explanation &&
      normalizeLatex(q.explanation).includes(term)
    ) ||

    (
      q.table &&
      normalizeLatex(
        q.table.replace(/<[^>]*>/g," ")
      ).includes(term)
    )

  );

  render(filtered, term);

});

function renderStatsPanel(){
  const statsContent = document.getElementById("statsContent");

  let correct=[], wrong=[], pending=[];
  let totalScore=0;

  questions.forEach(q=>{
    if(q.answered){
      if(q.gotCorrect){
        correct.push(q.id);
        totalScore += Number(q.mark || 1);
      } else {
        wrong.push(q.id);
        totalScore -= Number(q.negative || 0);
      }
    } else {
      pending.push(q.id);
    }
  });

  statsContent.innerHTML =
    "<p>🏆 স্কোর: " + totalScore + "</p>" +
    "<p>✔ সঠিক: " + correct.length + "</p>" +
    "<p>❌ ভুল: " + wrong.length + "</p>";
}
